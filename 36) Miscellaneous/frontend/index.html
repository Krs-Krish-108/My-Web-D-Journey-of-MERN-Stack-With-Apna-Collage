<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h3>GET request form</h3>

<!--    
    in ```method="get" ``` all the details filled is sent through and visible in the URL, which is unsafe, specially details like password.
    
    all details is sent via URL which as a result increases the length of the URL, and different browers all a specific lenth for a URL, which means if the length exceeds, the browser won't allow our URL.
-->

    <form method="get" action="http://localhost:3000/register">
        <input placeholder="Enter Name" type="text" name="Name">
        <input placeholder="Enter Password" type="password" name="Password">
        <button>Submit</button>
    </form>


<!-- method shows how our request will be sent once we submit the form -->

    <h3>POST request form</h3>
<!-- here the data is not sent directly via URL but rather sent inside the request body -->
    <form method="post" action="http://localhost:3000/register">
        <input placeholder="Enter Name" type="text" name="Name">
        <input placeholder="Enter Password" type="password" name="Password">
        <button>Submit</button>
    </form>
</body>

</html>
